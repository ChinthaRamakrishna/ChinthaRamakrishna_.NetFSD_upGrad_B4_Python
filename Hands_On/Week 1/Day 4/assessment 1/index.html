<!DOCTYPE html>
<html lang="en">
<body>
    <h2>Adult Checking</h2>

    <input type="text" id="ageInput" placeholder="Enter your age">
    <button onclick="checkAge()">Check</button>

    <p id="result"></p>
    <script>
        function checkAge() {
            const ageInput = document.getElementById('ageInput').value;
            const age = parseInt(ageInput);

            if (isNaN(age)) {
                document.getElementById('result').textContent = 'Please enter a valid number.';
                return;
            }

            if (age >= 18) {
                document.getElementById('result').textContent = 'You are an adult.';
            } else {
                document.getElementById('result').textContent = 'You are not an adult.';
            }
        }    </script>  
</body>
</html>
