<!DOCTYPE html>
<html>
<head>
<title>Student Grade Evaluator</title>
</head>
<body>

<h2>Student Grade Evaluator</h2>

<script>

/* Scenario:
Evaluate student performance based on marks */

/* Requirement: Accept student marks as a variable */
let marks = Number(prompt("Enter student's marks"));


/* Requirement: Use if–else to assign grades */
if (isNaN(marks) || marks < 0 || marks > 100) {

    /* Display result */
    document.write("Invalid Input");

}
else if (marks >= 75) {

    /* Marks ≥ 75 → Grade A */
    document.write("Grade A");

}
else if (marks >= 60) {

    /* Marks ≥ 60 → Grade B */
    document.write("Grade B");

}
else if (marks >= 40) {

    /* Marks ≥ 40 → Grade C */
    document.write("Grade C");

}
else {

    /* Marks < 40 → Fail */
    document.write("Fail");

}


</script>

</body>
</html>
