<!DOCTYPE html>
<html>
<head>
<title>Traffic Signal Simulator</title>

<style>
body{
font-family:Arial;
background:#222;
color:white;
text-align:center;
margin-top:40px;
}
.card{
background:#333;
width:320px;
margin:auto;
padding:20px;
border-radius:10px;
}
input,button{
width:90%;
padding:10px;
margin:10px;
border:none;
border-radius:5px;
}
button{
background:#4caf50;
color:white;
}
.result{
background:#444;
padding:10px;
margin-top:10px;
border-radius:5px;
}
</style>
</head>

<body>

<div class="card">

<h2>Traffic Signal Simulator</h2>

<!-- Requirement: Store signal color using string input -->
<input type="text" id="color" placeholder="Enter red / yellow / green">

<button onclick="runSignal()">Show Instruction</button>

<div id="display" class="result"></div>

</div>

<script>

/* Requirement: Must use switch–case, string data type, no if–else */
function runSignal(){

let signal = document.getElementById("color").value.toLowerCase();

/* Requirement: Use switch statement */
switch(signal){

case "red":
/* Red → Stop */
console.log("Stop");
document.getElementById("display").innerHTML="Stop";
break;

case "yellow":
/* Yellow → Get Ready */
console.log("Get Ready");
document.getElementById("display").innerHTML="Get Ready";
break;

case "green":
/* Green → Go */
console.log("Go");
document.getElementById("display").innerHTML="Go";
break;

/* Handle invalid input gracefully */
default:
console.log("Invalid Signal");
document.getElementById("display").innerHTML="Invalid Signal";

}

/* Learning Outcome:
- Used switch effectively
- Compared string values
- Handled multiple conditions
- Understood alternative to if–else */

}

</script>

</body>
</html>
