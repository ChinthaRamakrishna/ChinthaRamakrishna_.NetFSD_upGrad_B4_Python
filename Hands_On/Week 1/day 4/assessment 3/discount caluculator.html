<!DOCTYPE html>
<html>
<head>
<title>Discount Calculator</title>

<style>
body{
font-family:Arial;
text-align:center;
margin-top:50px;
}
.box{
border:1px solid #c00c0c;
padding:20px;
width:300px;
margin:auto;
}
</style>
</head>

<body>

<div class="box">

<h2>Discount Calculator</h2>

<!-- Requirement: Input purchase amount -->
<input type="number" id="amount" placeholder="Enter amount"><br><br>

<!-- Requirement: Button to calculate discount -->
<button onclick="calculate()">Calculate Discount</button>

<p id="discount"></p>
<p id="final"></p>

</div>

<script>

/* Requirement: Use arithmetic operators and if–else */
function calculate(){

/* Requirement: Get purchase amount */
let amount = Number(document.getElementById("amount").value);

/* Requirement: Primitive variables */
let discount = 0;
let finalAmount = 0;

/* Requirement: Apply discount rules */
if(amount >= 5000){
discount = amount * 0.20;
}
else if(amount >= 3000){
discount = amount * 0.10;
}
else{
discount = 0;
}

/* Requirement: Calculate final amount */
finalAmount = amount - discount;

/* Requirement: Display result on webpage */
document.getElementById("discount").innerHTML =
"Discount: ₹" + discount;

document.getElementById("final").innerHTML =
"Final Payable Amount: ₹" + finalAmount;

}

</script>

</body>
</html>
