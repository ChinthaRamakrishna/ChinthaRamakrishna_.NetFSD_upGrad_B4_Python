<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<!-- Requirement 1: Add viewport meta tag -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Responsive Website</title>

<style>

/* Desktop default style */
body{
    margin:0;
    font-family: Arial, sans-serif;
    background-color: lightblue; /* Desktop background */
}

header{
    background:#333;
    color:white;
    padding:15px;
    text-align:center;
}

/* Requirement 2: Navigation horizontal layout for desktop */
nav{
    display:flex;
    justify-content:center;
    background:#555;
}

nav a{
    color:white;
    padding:14px 20px;
    text-decoration:none;
}

.content{
    padding:20px;
    font-size:20px; /* Desktop font size */
}

/* Requirement 3: Use media query for mobile */
@media (max-width:768px){

    /* Requirement 4: Change background color on mobile */
    body{
        background-color: lightgreen;
    }

    /* Requirement 5: Convert navigation into vertical layout */
    nav{
        flex-direction:column;
        text-align:center;
    }

    /* Requirement 6: Adjust font size for smaller screens */
    .content{
        font-size:16px;
    }
}

</style>
</head>

<body>

<header>
<h1>My Responsive Website</h1>
</header>

<nav>
<a href="#">Home</a>
<a href="#">Courses</a>
<a href="#">Contact</a>
</nav>

<div class="content">
<p>This page automatically adjusts its layout based on screen size, showing a horizontal menu on desktop and a vertical menu with smaller text on mobile.</p>
</div>

</body>
</html>

        Add viewport meta tag to the HTML page- Done

        Change background color on mobile screen - Done
