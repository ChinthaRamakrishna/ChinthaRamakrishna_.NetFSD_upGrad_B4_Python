<!DOCTYPE html>
<html>
<head>
    <title>Course Enrollment Form</title>
</head>
<body>

<header>
    <h2>Course Enrollment Form</h2>
</header>

<main>
    <form>

        <!-- Name -->
        <label for="name">Full Name:</label><br>
        <input type="text" id="name" required><br><br>

        <!-- Email -->
        <label for="email">Email:</label><br>
        <input type="email" id="email" required><br><br>

        <!-- Course -->
        <label for="course">Select Course:</label><br>
        <input list="courses" id="course" required>

        <datalist id="courses">
            <option value="HTML">
            <option value="CSS">
            <option value="JavaScript">
            <option value="Python">
        </datalist>
        <br><br>

        <!-- Skill Range -->
        <label for="skill">Skill Level:</label><br>
        <input type="range" id="skill" min="1" max="3" value="1">
        <span id="levelText">Beginner</span>
        <br><br>

        <!-- Meter -->
        <label>Skill Meter:</label><br>
        <meter id="skillMeter" min="1" max="3" value="1"></meter>
        <br><br>

        <!-- Progress -->
        <label>Progress:</label><br>
        <progress id="skillProgress" max="3" value="1"></progress>
        <br><br>

        <input type="submit" value="Enroll">

    </form>
</main>

<script>
    const skill = document.getElementById("skill");
    const meter = document.getElementById("skillMeter");
    const progress = document.getElementById("skillProgress");
    const levelText = document.getElementById("levelText");

    skill.addEventListener("input", function () {
        meter.value = skill.value;
        progress.value = skill.value;

        if (skill.value == 1) {
            levelText.textContent = "Beginner";
        } else if (skill.value == 2) {
            levelText.textContent = "Intermediate";
        } else {
            levelText.textContent = "Advanced";
        }
    });
</script>

</body>
</html>
