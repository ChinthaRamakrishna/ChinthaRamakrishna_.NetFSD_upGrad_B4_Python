<!DOCTYPE html>
<html>
<head>
    <title>Suggested Values with Submit</title>
</head>
<body>

<h2>Select or Type Your City</h2>

<form>
    <input list="cities" name="city" placeholder="Enter city name">

    <datalist id="cities">
        <option value="Hyderabad">
        <option value="Chennai">
        <option value="Bangalore">
        <option value="Mumbai">
    </datalist>

    <br><br>

    <input type="submit" value="Submit">
</form>

</body>
</html>
