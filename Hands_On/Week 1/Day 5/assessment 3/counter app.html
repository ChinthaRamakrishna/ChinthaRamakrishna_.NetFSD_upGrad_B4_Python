<!DOCTYPE html>
<html>
<head>
  <title>Counter App</title>

  <style>
    body{
      font-family:Arial;
      background:#f2f2f2;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .box{
      background:white;
      padding:30px;
      border-radius:12px;
      box-shadow:0 0 15px rgba(0,0,0,0.2);
      text-align:center;
      border:2px solid #ddd;
      width:260px;
    }

    h2{
      color:#333;
    }

    #count{
      font-size:40px;
      margin:20px 0;
      color:#007bff;
      border:2px dashed #007bff;
      padding:10px;
      border-radius:8px;
    }

    button{
      padding:10px 15px;
      margin:5px;
      border:none;
      border-radius:6px;
      cursor:pointer;
      color:white;
    }

    .inc{background:#28a745;}
    .reset{background:#dc3545;}
  </style>
</head>
<body>

<div class="box">
  <h2>Counter App</h2>

  <div id="count">0</div>

  <button class="inc" id="incBtn">Increment</button>
  <button class="reset" id="resetBtn">Reset</button>
</div>

<script>
/* Global variable */
let counter=0;

/* Increment function */
function incrementCounter(step){
  counter+=step;
  document.getElementById("count").innerText=counter;
}

/* Reset */
function resetCounter(){
  counter=0;
  document.getElementById("count").innerText=counter;
}

/* No inline JS → event listeners */
document.getElementById("incBtn").addEventListener("click",function(){
  incrementCounter(1);
});

document.getElementById("resetBtn").addEventListener("click",resetCounter);
</script>

</body>
</html>
