<!DOCTYPE html>
<html>
<head>
  <title>Greeting Generator</title>
  <style>
    body{
      font-family:Arial;
      text-align:center;
      margin-top:80px;
    }
    input{padding:8px}
    button{padding:8px;margin-left:5px}
  </style>
</head>
<body>

<h2>Greeting Generator</h2>

<!-- Input -->
<input type="text" id="username" placeholder="Enter your name">

<!-- Button -->
<button onclick="handleClick()">Generate Greeting</button>

<!-- Output -->
<p id="message"></p>

<script>
// Button handler
function handleClick(){
  let name=document.getElementById("username").value;
  generateGreeting(name);   // pass parameter
}

// Requirement: function keyword + parameter
function generateGreeting(name){

  // Local variable
  let greeting="Hello, "+name+"! Welcome to our website.";

  document.getElementById("message").innerText=greeting;
}
</script>

</body>
</html>
