<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Marks Analyzer</title>

<style>
body{
    font-family: Arial;
    background:#d68306;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:rgb(226, 215, 65);
    padding:25px;
    border-radius:10px;
    width:380px;
    text-align:center;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
    color:#333;
}

input{
    width:90%;
    padding:10px;
    margin:10px 0;
}

button{
    padding:10px 20px;
    background:#17b61d;
    color:white;
    border:none;
    cursor:pointer;
}

button:hover{
    background:#45a049;
}

.result{
    margin-top:15px;
    text-align:left;
}
</style>
</head>

<body>

<div class="container">

<h2>Student Marks Analyzer</h2>


<input type="text" id="marksInput" placeholder="Enter marks (e.g 80,70,90)">
<button onclick="analyzeMarks()">Analyze</button>

<div class="result" id="output"></div>

</div>

<script type="module">

const analyzeMarks = () => {

    const input = document.getElementById("marksInput").value;

    // Convert input string to array of numbers using map()
    const marks = input.split(",").map(num => Number(num.trim()));

    // Calculate total using reduce()
    const total = marks.reduce((sum,m)=> sum + m ,0);

    const average = marks.length ? (total / marks.length) : 0;

    const result = average >= 40 ? "Pass ✅" : "Fail ❌";
    // Display output using template literals.
    document.getElementById("output").innerHTML = `
        <p>Marks: ${marks}</p>
        <p>Total: ${total}</p>
        <p>Average: ${average.toFixed(2)}</p>
        <p>Result: ${result}</p>
    `;
};

// make function global
window.analyzeMarks = analyzeMarks;

</script>

</body>
</html>
