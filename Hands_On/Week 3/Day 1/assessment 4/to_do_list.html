<!DOCTYPE html>
<html>
<head>
    <title>Interactive To-Do List</title>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#1d2163;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }

        .todo-box{
            background:rgb(55, 88, 104);
            padding:30px;
            width:400px;
            border-radius:10px;
            box-shadow:0px 5px 15px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
        }

        .input-group{
            display:flex;
            gap:10px;
        }

        input{
            flex:1;
            padding:10px;
            border-radius:6px;
            border:1px solid #ccc;
        }

        button{
            padding:10px 15px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:6px;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }

        ul{
            list-style:none;
            padding:0;
            margin-top:20px;
        }

        li{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:8px;
            background:#f1f1f1;
            margin-bottom:8px;
            border-radius:5px;
        }

        .completed{
            text-decoration: line-through;
            color:gray;
        }

        .delete-btn{
            background:red;
            padding:5px 8px;
            font-size:12px;
        }

        .stats{
            margin-top:15px;
            font-size:14px;
        }
    </style>
</head>

<body>

<div class="todo-box">

    <h2>To-Do List</h2>

    <!-- Input + Add Button -->
    <div class="input-group">
        <input type="text" id="taskInput" placeholder="Enter new task">
        <button id="addTask">Add</button>
    </div>

    <!-- Task List -->
    <ul id="taskList"></ul>

    <!-- Task Count -->
    <div class="stats">
        Total Tasks: <span id="totalCount">0</span><br>
        Completed Tasks: <span id="completedCount">0</span>
    </div>

</div>

<script>

$(document).ready(function(){

    function updateCounts(){
        let total = $("#taskList li").length;
        let completed = $("#taskList li.completed").length;

        $("#totalCount").text(total);
        $("#completedCount").text(completed);
    }

    // Add Task
    $("#addTask").click(function(){

        let taskText = $("#taskInput").val().trim();

        if(taskText !== ""){

            $("#taskList").append(
                "<li>" +
                "<span class='task-text'>" + taskText + "</span>" +
                "<button class='delete-btn'>Delete</button>" +
                "</li>"
            );

            $("#taskInput").val("");
            updateCounts();
        }
    });

    // Mark as Completed (Dynamic Event Handling)
    $("#taskList").on("click", ".task-text", function(){
        $(this).parent().toggleClass("completed");
        updateCounts();
    });

    // Delete Task
    $("#taskList").on("click", ".delete-btn", function(){
        $(this).parent().remove();
        updateCounts();
    });

});

</script>

</body>
</html>
