<!DOCTYPE html>
<html>
<head>
    <title>Product Cart Counter</title>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f6f9;
            margin:0;
            padding:20px;
        }

        .header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:20px;
        }

        .cart{
            background:#007bff;
            color:white;
            padding:10px 15px;
            border-radius:20px;
        }

        .products{
            display:grid;
            grid-template-columns:repeat(2, 1fr);
            gap:20px;
        }

        .product{
            background:white;
            padding:15px;
            border-radius:10px;
            box-shadow:0px 4px 10px rgba(0,0,0,0.1);
            text-align:center;
        }

        button{
            padding:8px 12px;
            background:#28a745;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        button:disabled{
            background:gray;
            cursor:not-allowed;
        }

        .added-msg{
            color:green;
            font-size:13px;
            margin-top:8px;
        }

    </style>
</head>

<body>

<div class="header">
    <h2>Our Products</h2>
    <div class="cart">
        Cart Items: <span id="cartCount">0</span>
    </div>
</div>

<div class="products">

    <div class="product">
        <h3>Product 1</h3>
        <p>Price: ₹500</p>
        <button class="addBtn" data-name="Product 1">Add to Cart</button>
        <div class="added-msg"></div>
    </div>

    <div class="product">
        <h3>Product 2</h3>
        <p>Price: ₹700</p>
        <button class="addBtn" data-name="Product 2">Add to Cart</button>
        <div class="added-msg"></div>
    </div>

    <div class="product">
        <h3>Product 3</h3>
        <p>Price: ₹900</p>
        <button class="addBtn" data-name="Product 3">Add to Cart</button>
        <div class="added-msg"></div>
    </div>

    <div class="product">
        <h3>Product 4</h3>
        <p>Price: ₹1200</p>
        <button class="addBtn" data-name="Product 4">Add to Cart</button>
        <div class="added-msg"></div>
    </div>

</div>

<script>

$(document).ready(function(){

    let count = 0;

    // Event Delegation
    $(".products").on("click", ".addBtn", function(){

        count++;

        // Update cart counter
        $("#cartCount").text(count);

        // Disable button
        $(this).prop("disabled", true);

        // Change button text
        $(this).text("Added");

        // Add custom attribute
        $(this).attr("data-added", "true");

        // Show confirmation message
        $(this).siblings(".added-msg")
               .text("Product added successfully!");

    });

});

</script>

</body>
</html>
