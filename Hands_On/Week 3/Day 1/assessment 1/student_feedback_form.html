<!DOCTYPE html>
<html>
<head>
    <title>Student Feedback Form</title>

    <!-- Technical Constraint: jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#0e4e74;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }

        .form-box{
            background:rgb(122, 188, 231);
            padding:30px;
            width:380px;
            border-radius:10px;
            box-shadow:0px 5px 15px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
        }

        input, select, textarea{
            width:100%;
            padding:10px;
            margin-bottom:10px;
            border-radius:6px;
            border:1px solid #0c0c0c;
            box-sizing:border-box;
        }

        .error{
            color:red;
            font-size:13px;
            margin-bottom:10px;
        }

        .success{
            color:green;
            margin-top:15px;
            text-align:center;
            font-weight:bold;
        }

        button{
            width:100%;
            padding:10px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }
    </style>
</head>

<body>

<div class="form-box">

    <h2>Student Feedback</h2>

    <!-- Requirement: Feedback Form Fields -->
    <form id="feedbackForm">

        <input type="text" id="name" placeholder="Enter Your Name">
        <div id="nameError" class="error"></div>

        <input type="email" id="email" placeholder="Enter Your Email">
        <div id="emailError" class="error"></div>

        <select id="rating">
            <option value="">Select Course Rating</option>
            <option>Excellent</option>
            <option>Good</option>
            <option>Average</option>
            <option>Poor</option>
        </select>

        <textarea id="comments" placeholder="Enter Comments"></textarea>

        <button type="button" id="submitBtn">Submit</button>

    </form>

    <!-- Requirement: Success message below form -->
    <div id="successMessage" class="success"></div>

</div>

<script>

$(document).ready(function(){

    // Event Handling using jQuery
    $("#submitBtn").click(function(){

        // Capture inputs using jQuery selectors
        let name = $("#name").val().trim();
        let email = $("#email").val().trim();

        // Clear old messages
        $(".error").text("");
        $("#successMessage").text("");

        // Validation
        if(name === ""){
            $("#nameError").text("Please enter your name.");
        }
        else if(email === ""){
            $("#emailError").text("Please enter your email.");
      
        }
        else{

            // Display success message dynamically
            $("#successMessage")
                .text("Thank you " + name + "! Your feedback has been submitted successfully.");

            // Clear form fields
            $("#feedbackForm")[0].reset();
        }

    });

});

</script>

</body>
</html>
