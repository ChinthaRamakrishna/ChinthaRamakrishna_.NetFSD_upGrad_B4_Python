<!DOCTYPE html>
<html>
<head>
<title>Task Manager Async</title>

<style>
body{
font-family:Arial;
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}
.box{
background:white;
padding:20px;
border-radius:10px;
width:360px;
box-shadow:0 0 10px gray;
}
pre{background:#eee;padding:10px;border-radius:5px;}
button{margin:5px;}
</style>
</head>
<body>

<div class="box">
<h2>Task Manager</h2>

<button id="run">Run Demo</button>
<pre id="output"></pre>
</div>

<script type="module">
import { addTask, deleteTask, listTasks } from "./taskModule.js";

const output = document.getElementById("output");

document.getElementById("run").onclick = async () => {

    let text = "";

    text += `${await addTask("Learn JavaScript")}\n`;
    text += `${await addTask("Practice DSA")}\n`;
    text += `${await listTasks()}\n\n`;

    text += `${await deleteTask("Learn JavaScript")}\n`;
    text += `${await listTasks()}`;

    output.textContent = text;
};
</script>

</body>
</html>
