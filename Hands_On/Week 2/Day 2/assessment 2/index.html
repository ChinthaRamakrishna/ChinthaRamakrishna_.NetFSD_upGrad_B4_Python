<!DOCTYPE html>
<html>
<head>
<title>Product Cart Summary</title>

<style>
body{
font-family: Arial;
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}
.box{
background:white;
padding:20px;
border-radius:10px;
width:350px;
box-shadow:0 0 10px gray;
}
h2{text-align:center;}
pre{
background:#eee;
padding:10px;
border-radius:5px;
}
</style>
</head>
<body>

<div class="box">
<h2>Product Cart Summary</h2>
<pre id="output"></pre>
</div>

<!-- module script -->
<script type="module">

import { calculateInvoice } from "./cartModule.js";

const cart = [
{name:"Laptop", price:55000, qty:2},
{name:"Mouse", price:500, qty:4},
{name:"Keyboard", price:1500, qty:1}
];

const invoice = calculateInvoice(cart);

document.getElementById("output").textContent = invoice;

</script>

</body>
</html>
