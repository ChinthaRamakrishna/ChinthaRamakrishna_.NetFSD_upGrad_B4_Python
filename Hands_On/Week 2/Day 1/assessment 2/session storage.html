<!DOCTYPE html>
<html>
<head>
  <title>Live Form Validation</title>

  <style>
    body{
      font-family: Arial;
      background:#f2f2f2;
    }

    .box{
      width:320px;
      margin:80px auto;
      background:#fff;
      padding:50px;
      border-radius:6px;
      box-shadow:0 0 10px rgba(0,0,0,0.2);
    }

    label{
      display:block;
      margin-top:10px;
    }

    input{
      width:100%;
      padding:8px;
      margin-top:5px;
    }

    p{
      margin:5px 0;
      font-size:14px;
      color:red;   /* validation color */
    }

    button{
      width:50%;
      padding:10px;
      margin-top:15px;
      background:#007bff;
      color:white;
      border:none;
      border-radius:5px;
      cursor:pointer;
    }
  </style>
</head>

<body>

<div class="box">
<h2>Registration Form</h2>

<label>Name</label>
<input type="text" id="name" onchange="validateName()">
<p id="nameMsg"></p>

<label>Email</label>
<input type="text" id="email" onchange="validateEmail()">
<p id="emailMsg"></p>

<label>Age (>18)</label>
<input type="number" id="age" onchange="validateAge()">
<p id="ageMsg"></p>

<button onclick="saveData()">Submit</button>
</div>

<script>
function validateName(){
  let name=document.getElementById("name").value;
  document.getElementById("nameMsg").innerText =
    name ? "" : "Name cannot be empty";
}

function validateEmail(){
  let email=document.getElementById("email").value;
  document.getElementById("emailMsg").innerText =
    email.includes("@") ? "" : "Email must contain @";
}

function validateAge(){
  let age=document.getElementById("age").value;
  document.getElementById("ageMsg").innerText =
    age>18 ? "" : "Age must be greater than 18";
}

function saveData(){
  let name=document.getElementById("name").value;
  let email=document.getElementById("email").value;
  let age=document.getElementById("age").value;

  if(name && email.includes("@") && age>18){
    sessionStorage.setItem("userName",name);
    sessionStorage.setItem("userEmail",email);
    sessionStorage.setItem("userAge",age);
    alert("Data stored in sessionStorage");
  }else{
    alert("Please enter valid details");
  }
}
</script>

</body>
</html>
