<!DOCTYPE html>
<html>
<head>
<title>Mini Expense Tracker</title>

<style>
body{
    font-family:Arial;
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.container{
    background:white;
    padding:30px;
    border-radius:12px;
    width:360px;
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

h2{
    text-align:center;
}

input{
    width:100%;
    padding:10px;
    margin:6px 0;
    border-radius:6px;
    border:1px solid #ccc;
}

button{
    width:50%;
    padding:10px;
    margin-top:8px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

/* list heading */
.listTitle{
    margin-top:15px;
    font-weight:bold;
}

/* expense card */
.item{
    background:#f9f9f9;
    padding:8px;
    border-radius:6px;
    margin-top:6px;
    border-left:4px solid #4CAF50;
}
</style>

<script>
function loadExpenses(){
    let data=JSON.parse(localStorage.getItem("expenses"))||[];
    display(data);
}

function addExpense(){
    let title=document.getElementById("title").value;
    let amount=document.getElementById("amount").value;
    let date=document.getElementById("date").value;

    if(!title || !amount || !date){
        alert("Enter all fields");
        return;
    }

    let expense={title,amount,date};

    let data=JSON.parse(localStorage.getItem("expenses"))||[];
    data.push(expense);

    localStorage.setItem("expenses",JSON.stringify(data));

    display(data);
}

function display(data){
    let list=document.getElementById("list");
    list.innerHTML="";

    data.forEach(e=>{
        list.innerHTML+=`
        <div class="item">
        <b>${e.title}</b><br>
        Amount: ₹${e.amount}<br>
        Date: ${e.date}
        </div>`;
    });
}
</script>
</head>

<body onload="loadExpenses()">

<div class="container">

<h2>Mini Expense Tracker</h2>

<input id="title" placeholder="Title">
<input id="amount" type="number" placeholder="Amount">
<input id="date" type="date">

<button onclick="addExpense()">Add Expense</button>

<!-- heading sentence -->
<div class="listTitle">Expense Added List</div>

<!-- display list -->
<div id="list"></div>

</div>

</body>
</html>
