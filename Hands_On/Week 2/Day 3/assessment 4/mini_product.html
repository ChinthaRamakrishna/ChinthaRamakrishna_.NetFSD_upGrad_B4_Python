<!DOCTYPE html>
<html>
<head>
<title>Mini Product Search</title>

<style>
body{
    font-family:Arial;
    background:linear-gradient(135deg,#74ebd5,#acb6e5);
    display:flex;
    justify-content:center;
    align-items:flex-start;
    height:100vh;
    padding-top:40px;
}

.container{
    background:white;
    width:400px;
    padding:20px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
}

input{
    width:85%;
    padding:12px;
    margin-top:10px;
    border-radius:8px;
    border:1px solid #ddd;
    font-size:16px;
}

.product{
    background:#f7f7f7;
    padding:12px;
    margin-top:10px;
    border-radius:8px;
    display:flex;
    justify-content:space-between;
    transition:0.2s;
}

.product:hover{
    transform:scale(1.03);
    background:#e9f5ff;
}

.price{
    font-weight:bold;
    color:#0077ff;
}

#noResult{
    text-align:center;
    margin-top:15px;
    color:red;
}
</style>
</head>

<body>

<div class="container">
<h2>Product Search</h2>

<input type="text" id="search" placeholder="Search product...">

<div id="productList"></div>
<div id="noResult"></div>
</div>

<script>

/* State (Product Array) */
const products = [
    {name:"Laptop",price:60000},
    {name:"Mobile",price:20000},
    {name:"Headphones",price:2000},
    {name:"Keyboard",price:1500},
    {name:"Mouse",price:800},
    {name:"Monitor",price:12000},
    {name:"Printer",price:5000},
    {name:"Webcam",price:3000},
    {name:"Speaker",price:2500},
    {name:"External Hard Drive",price:4000},
    {name:"USB Flash Drive",price:500},


];

const searchInput = document.getElementById("search");
const productList = document.getElementById("productList");
const noResult = document.getElementById("noResult");

/* Render Products */
function render(list){
    productList.innerHTML="";
    if(list.length===0){
        noResult.textContent="No Results Found";
        return;
    }
    noResult.textContent="";

    list.forEach(p=>{
        const div=document.createElement("div");
        div.className="product";
        div.innerHTML=`<span>${p.name}</span><span class="price">₹${p.price}</span>`;
        productList.appendChild(div);
    });
}

/* Filter Function */
function filterProducts(){
    const value=searchInput.value.toLowerCase();
    const filtered=products.filter(p=>p.name.toLowerCase().includes(value));
    render(filtered);
}

/* Event */
searchInput.addEventListener("input",filterProducts);

/* Initial render */
render(products);

</script>

</body>
</html>
